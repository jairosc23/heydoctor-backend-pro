# Backup PostgreSQL → objeto (S3 / R2). Equivalente funcional a postgres-backup.yml.
#
# Railway:
# - Secreto DATABASE_URL: copiar la URL pública del plugin PostgreSQL (incluye TLS).
# - El script añade sslmode=require si la URL no trae sslmode (libpq / pg_dump).
# - pg_dump se ejecuta desde GitHub Actions: la BD debe aceptar conexiones externas
#   (comportamiento habitual en Railway; si no, este job fallará por red, no por el script).
#
name: PostgreSQL Daily Backup

on:
  schedule:
    - cron: "0 6 * * *" # 3 AM Chile (UTC-3)
  workflow_dispatch: # Manual trigger

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
  BACKUP_RETENTION_DAYS: "30"
  # Opcional: timeout de conexión libpq (segundos)
  PGCONNECT_TIMEOUT: "30"
  # Evita avisos de deprecación Node 20 en actions/checkout (transición a Node 24 en runners).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      # Solo cliente Postgres por apt. En Ubuntu 24.04 Noble NO usar `apt install awscli` (sin candidato).
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      # AWS CLI v2 sin apt: instalación mantenida para runners ubuntu-latest.
      - name: Install AWS CLI v2
        uses: unfor19/install-aws-cli-action@v1
        with:
          version: "2"

      - name: Verify tools
        run: |
          pg_dump --version
          aws --version

      - name: Run backup
        run: |
          chmod +x scripts/backup-postgres.sh
          bash scripts/backup-postgres.sh

      - name: Notify on failure
        if: failure()
        run: echo "::error::Database backup failed!"
